services:
  clawpond:
    build:
      context: .
      dockerfile: Dockerfile
    image: dovics1/clawpond:latest
    container_name: clawpond
    restart: unless-stopped
    ports:
      - "${CLAWPOND_PORT:-3000}:3000"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-a0421e2f9e6811518d3ad7ad7b51d6732c1dabc2df8fa011027a9920062b85d0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/app/workspace
      - ./templates:/app/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
