services:
  # ClawPond - ZeroClaw 管理界面
  clawpond:
    build:
      context: .
      dockerfile: Dockerfile
    image: clawpond:latest
    container_name: clawpond
    restart: unless-stopped
    ports:
      - "${CLAWPOND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - HOST_UID=1001
      - HOST_GID=1001
      - WORKSPACE_ROOT=/app/workspace
      # Auth settings
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist workspace data
      - clawpond_workspace:/app/workspace
      # Persist auth token data
      - clawpond_data:/app/data
    networks:
      - clawpond_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  clawpond_workspace:
    driver: local
  clawpond_data:
    driver: local

networks:
  clawpond_network:
    driver: bridge
